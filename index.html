document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

12, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* fallback */\n@font-face {\n  font-family: 'Material Symbols Rounded';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"45b84f25-475f-48a1-b336-5501176c08e2\") format('woff2');\n}\n\n.material-symbols-rounded {\n  font-family: 'Material Symbols Rounded';\n  font-weight: normal;\n  font-style: normal;\n  font-size: 24px;\n  line-height: 1;\n  letter-spacing: normal;\n  text-transform: none;\n  display: inline-block;\n  white-space: nowrap;\n  word-wrap: normal;\n  direction: ltr;\n  -webkit-font-feature-settings: 'liga';\n  -webkit-font-smoothing: antialiased;\n}\n<\u002Fstyle>\n<script src=\"1026048c-77b6-4991-a378-eb640dbd299a\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; font-family: \"Figtree\", ui-sans-serif, system-ui, sans-serif; color: #252530; background: #DEDCEC; }\n  .ms { font-family: \"Material Symbols Rounded\"; font-weight: normal; font-style: normal; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; direction: ltr; -webkit-font-feature-settings: \"liga\"; -webkit-font-smoothing: antialiased; }\n  a { color: #FF492C; text-decoration: none; }\n  a:hover { text-decoration: underline; }\n  ::selection { background: #FF492C; color: #fff; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<section id=\"1a\" style=\"padding: 40px; display: flex; flex-direction: column; align-items: flex-start; gap: 14px;\">\n  <div style=\"display: flex; align-items: center; gap: 12px; padding-left: 4px;\">\n    <span style=\"font-family: 'Figtree'; font-weight: 800; font-size: 13px; letter-spacing: 0.02em; color: #fff; background: #FF492C; border-radius: 999px; padding: 5px 12px;\">1a<\u002Fspan>\n    <span style=\"font-size: 14px; font-weight: 600; color: #062846;\">Personalized G2 profile — auto-tailors to the logged-in buyer, live-editable via “This is me”.<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"width: 1180px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 14px 40px rgba(6,40,70,.12);\">\n\n    <!-- ===== TOP NAV ===== -->\n    <div style=\"height: 66px; border-bottom: 1px solid #E5E5E8; display: flex; align-items: center; gap: 28px; padding: 0 32px;\">\n      <div style=\"display: flex; align-items: center; gap: 10px;\">\n        <img src=\"281f15da-c628-4498-bc6c-8274a1ad09cf\" alt=\"G2\" width=\"34\" height=\"34\" style=\"display: block;\">\n        <span style=\"font-weight: 800; font-size: 20px; letter-spacing: -0.02em; color: #062846;\">G2<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex: 1; max-width: 420px; height: 40px; background: #F7F7F8; border: 1px solid #E5E5E8; border-radius: 999px; display: flex; align-items: center; gap: 8px; padding: 0 16px; color: #666;\">\n        <span class=\"ms\" style=\"font-size: 20px;\">search<\u002Fspan>\n        <span style=\"font-size: 14px;\">Search 2.4M+ software reviews<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 24px; margin-left: auto; font-size: 14px; font-weight: 600; color: #3B3B42;\">\n        <span>Categories<\u002Fspan>\n        <span>Compare<\u002Fspan>\n        <span>Write a review<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 10px; padding-left: 8px; border-left: 1px solid #E5E5E8; height: 34px;\">\n        <div style=\"width: 34px; height: 34px; border-radius: 999px; background: #062846; color: #fff; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center;\">WK<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== TAILORED-FOR-YOU CONTROL BAR (navy inverse) ===== -->\n    <div style=\"background: #062846; color: #fff; padding: 16px 32px;\">\n      <div style=\"display: flex; align-items: center; gap: 16px; flex-wrap: wrap;\">\n        <span class=\"ms\" style=\"font-size: 22px; color: #FF9500;\">auto_awesome<\u002Fspan>\n        <span style=\"font-size: 14px; font-weight: 700;\">Tailored for you<\u002Fspan>\n        <div style=\"display: flex; align-items: center; gap: 8px; flex-wrap: wrap;\">\n          <span style=\"font-size: 13px; font-weight: 600; background: rgba(255,255,255,.12); border-radius: 999px; padding: 6px 14px;\">{{ profile.industry }}<\u002Fspan>\n          <span style=\"font-size: 13px; font-weight: 600; background: rgba(255,255,255,.12); border-radius: 999px; padding: 6px 14px;\">{{ profile.size }}<\u002Fspan>\n          <span style=\"font-size: 13px; font-weight: 600; background: rgba(255,255,255,.12); border-radius: 999px; padding: 6px 14px;\">{{ profile.experience }}<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ onToggleEditor }}\" style=\"margin-left: auto; display: flex; align-items: center; gap: 6px; background: #FF492C; color: #fff; border: none; border-radius: 999px; padding: 9px 18px; font-family: 'Figtree'; font-size: 13px; font-weight: 700; cursor: pointer;\" style-hover=\"background: #CB1D23;\">\n          <span class=\"ms\" style=\"font-size: 18px;\">tune<\u002Fspan>{{ editorLabel }}\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ editorOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top: 16px; background: #fff; border-radius: 16px; padding: 22px 24px; color: #252530; display: flex; flex-direction: column; gap: 18px;\">\n          <div style=\"font-size: 13px; color: #666;\">Adjust your profile — every chart, rating and recommendation below updates to your context.<\u002Fdiv>\n\n          <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n            <div style=\"font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #666;\">Your industry<\u002Fdiv>\n            <div style=\"display: flex; gap: 8px; flex-wrap: wrap;\">\n              <sc-for list=\"{{ industryOpts }}\" as=\"opt\" hint-placeholder-count=\"6\">\n                <button onclick=\"{{ opt.onSelect }}\" style=\"font-family: 'Figtree'; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 999px; padding: 8px 16px; background: {{ opt.bg }}; color: {{ opt.fg }}; border: 1px solid {{ opt.border }};\">{{ opt.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n            <div style=\"font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #666;\">Company size<\u002Fdiv>\n            <div style=\"display: flex; gap: 8px; flex-wrap: wrap;\">\n              <sc-for list=\"{{ sizeOpts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ opt.onSelect }}\" style=\"font-family: 'Figtree'; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 999px; padding: 8px 16px; background: {{ opt.bg }}; color: {{ opt.fg }}; border: 1px solid {{ opt.border }};\">{{ opt.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n            <div style=\"font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #666;\">Past experience with similar tools<\u002Fdiv>\n            <div style=\"display: flex; gap: 8px; flex-wrap: wrap;\">\n              <sc-for list=\"{{ expOpts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ opt.onSelect }}\" style=\"font-family: 'Figtree'; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 999px; padding: 8px 16px; background: {{ opt.bg }}; color: {{ opt.fg }}; border: 1px solid {{ opt.border }};\">{{ opt.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- ===== PAGE BODY ===== -->\n    <div style=\"padding: 40px 48px 56px; display: flex; flex-direction: column; gap: 56px;\">\n\n      <!-- HERO -->\n      <div style=\"display: grid; grid-template-columns: 1.35fr 1fr; gap: 40px; align-items: start;\">\n        <div>\n          <div style=\"display: flex; align-items: center; gap: 18px;\">\n            <div style=\"width: 76px; height: 76px; border-radius: 18px; background: #EBE9F5; display: flex; align-items: center; justify-content: center; flex-shrink: 0;\">\n              <span style=\"font-weight: 900; font-size: 34px; color: #288DFF; letter-spacing: -0.03em;\">J<\u002Fspan>\n            <\u002Fdiv>\n            <div>\n              <h1 style=\"font-weight: 800; font-size: 40px; letter-spacing: -0.02em; color: #000; margin: 0; line-height: 1.05;\">Jira<\u002Fh1>\n              <div style=\"font-size: 15px; color: #666; margin-top: 4px;\">by Atlassian · Project Management Software<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: flex; align-items: center; gap: 16px; margin-top: 22px;\">\n            <div style=\"font-weight: 900; font-size: 46px; letter-spacing: -0.02em; color: #000; line-height: 1;\">{{ ratingShown }}<\u002Fdiv>\n            <div>\n              <div style=\"position: relative; display: inline-block;\">\n                <div style=\"display: flex; gap: 2px; color: #DCDAE8; font-size: 26px;\">\n                  <span class=\"ms\">star<\u002Fspan><span class=\"ms\">star<\u002Fspan><span class=\"ms\">star<\u002Fspan><span class=\"ms\">star<\u002Fspan><span class=\"ms\">star<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"position: absolute; inset: 0; display: flex; gap: 2px; color: #FF492C; font-size: 26px; overflow: hidden; width: {{ ratingPct }}%;\">\n                  <span class=\"ms\">star<\u002Fspan><span class=\"ms\">star<\u002Fspan><span class=\"ms\">star<\u002Fspan><span class=\"ms\">star<\u002Fspan><span class=\"ms\">star<\u002Fspan>\n                <\u002Fdiv>\n ding: 4px 12px; letter-spacing: 0.03em;\">RECOMMENDED FOR YOU<\u002Fdiv><\u002Fsc-if>\n              <div style=\"font-size: 16px; font-weight: 800; color: #062846;\">{{ t.name }}<\u002Fdiv>\n              <div style=\"display: flex; align-items: baseline; gap: 4px; margin: 6px 0 2px;\"><span style=\"font-size: 28px; font-weight: 900; color: #000; letter-spacing: -0.02em;\">{{ t.price }}<\u002Fspan><span style=\"font-size: 13px; color: #666;\">{{ t.unit }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size: 13px; color: #666; line-height: 1.4; margin-bottom: 14px;\">{{ t.blurb }}<\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 9px;\">\n                <sc-for list=\"{{ t.features }}\" as=\"f\" hint-placeholder-count=\"3\">\n                  <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span class=\"ms\" style=\"font-size: 17px; color: #40BF40; flex-shrink: 0;\">check<\u002Fspan><span style=\"font-size: 13px; line-height: 1.4; color: #3B3B42;\">{{ f }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ALTERNATIVES / COMPARISON -->\n      <div>\n        <div style=\"font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #FF492C;\">Alternatives<\u002Fdiv>\n        <h2 style=\"font-weight: 800; font-size: 30px; letter-spacing: -0.015em; color: #000; margin: 6px 0 24px;\">How Jira compares for a team like yours<\u002Fh2>\n        <div style=\"border: 1px solid #E5E5E8; border-radius: 18px; overflow: hidden;\">\n          <div style=\"display: grid; grid-template-columns: 1.4fr 1fr 1.1fr 1.5fr; background: #062846; color: #fff; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;\">\n            <div style=\"padding: 14px 20px;\">Product<\u002Fdiv>\n            <div style=\"padding: 14px 20px;\">Rating<\u002Fdiv>\n            <div style=\"padding: 14px 20px;\">Best fit<\u002Fdiv>\n            <div style=\"padding: 14px 20px;\">For your team<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ alternatives }}\" as=\"a\" hint-placeholder-count=\"5\">\n            <div style=\"display: grid; grid-template-columns: 1.4fr 1fr 1.1fr 1.5fr; align-items: center; border-top: 1px solid #E5E5E8; background: {{ a.rowBg }};\">\n              <div style=\"padding: 16px 20px; display: flex; align-items: center; gap: 12px;\">\n                <div style=\"width: 34px; height: 34px; border-radius: 9px; background: {{ a.logoBg }}; color: #fff; font-weight: 800; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;\">{{ a.initial }}<\u002Fdiv>\n                <span style=\"font-size: 15px; font-weight: 700; color: #062846;\">{{ a.name }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding: 16px 20px; display: flex; align-items: center; gap: 7px;\">\n                <span class=\"ms\" style=\"font-size: 18px; color: #FF9500;\">star<\u002Fspan><span style=\"font-size: 15px; font-weight: 700; color: #252530;\">{{ a.rating }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding: 16px 20px; font-size: 13px; color: #3B3B42;\">{{ a.bestFit }}<\u002Fdiv>\n              <div style=\"padding: 16px 20px;\">\n                <span style=\"font-size: 13px; font-weight: 700; color: {{ a.fitColor }}; display: flex; align-items: center; gap: 7px;\"><span class=\"ms\" style=\"font-size: 18px;\">{{ a.fitIcon }}<\u002Fspan>{{ a.fitLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- INTERACTIVE DEMO -->\n      <div>\n        <div style=\"font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #FF492C;\">See it in action<\u002Fdiv>\n        <h2 style=\"font-weight: 800; font-size: 30px; letter-spacing: -0.015em; color: #000; margin: 6px 0 20px;\">Interactive demo<\u002Fh2>\n        <div style=\"display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;\">\n          <sc-for list=\"{{ demoTabs }}\" as=\"tab\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ tab.onSelect }}\" style=\"font-family: 'Figtree'; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 999px; padding: 9px 18px; background: {{ tab.bg }}; color: {{ tab.fg }}; border: 1.5px solid {{ tab.border }};\">{{ tab.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"border: 1px solid #E5E5E8; border-radius: 18px; overflow: hidden;\">\n          <div style=\"height: 40px; background: #F7F7F8; border-bottom: 1px solid #E5E5E8; display: flex; align-items: center; gap: 8px; padding: 0 16px;\">\n            <span style=\"width: 11px; height: 11px; border-radius: 999px; background: #FF5F57; display: inline-block;\"><\u002Fspan>\n            <span style=\"width: 11px; height: 11px; border-radius: 999px; background: #FEBC2E; display: inline-block;\"><\u002Fspan>\n            <span style=\"width: 11px; height: 11px; border-radius: 999px; background: #28C840; display: inline-block;\"><\u002Fspan>\n            <span style=\"font-size: 13px; color: #666; margin-left: 12px; font-weight: 600;\">{{ demoCaption }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"height: 440px; position: relative; background: #EBE9F5;\">\n            <image-slot id=\"jira-demo\" shape=\"rect\" placeholder=\"Drop a Jira board / timeline screenshot or a demo video frame\"><\u002Fimage-slot>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size: 13px; color: #666; margin-top: 12px;\">Tabs are illustrative — drop the matching Jira screen or a short demo clip frame for testing.<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- ===== FOOTER ===== -->\n    <div style=\"background: #062846; color: #fff; padding: 32px 48px; display: flex; align-items: center; justify-content: space-between;\">\n      <div style=\"display: flex; align-items: center; gap: 10px;\">\n        <img src=\"281f15da-c628-4498-bc6c-8274a1ad09cf\" alt=\"G2\" width=\"28\" height=\"28\" style=\"display: block;\">\n        <span style=\"font-weight: 800; font-size: 16px;\">G2<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size: 13px; color: rgba(255,255,255,.6);\">Personalized profile concept · Updated Q3-2026<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 900}, &quot;defaultIndustry&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Software / IT&quot;, &quot;Financial Services&quot;, &quot;Marketing / Advertising&quot;, &quot;Education&quot;, &quot;Healthcare&quot;, &quot;Retail / E-commerce&quot;], &quot;default&quot;: &quot;Software / IT&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Default buyer profile&quot;}, &quot;defaultSize&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Startup (1–50)&quot;, &quot;Mid-Market (51–1,000)&quot;, &quot;Enterprise (1,000+)&quot;], &quot;default&quot;: &quot;Mid-Market (51–1,000)&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Default buyer profile&quot;}, &quot;peerViewDefault&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Default buyer profile&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      profile: {\n        industry: props.defaultIndustry || 'Software / IT',\n        size: props.defaultSize || 'Mid-Market (51–1,000)',\n        experience: 'Used Trello / Asana',\n      },\n      peerOnly: props.peerViewDefault || false,\n      editorOpen: false,\n      demoTab: 0,\n    };\n  }\n\n  clamp(n) { return Math.max(0, Math.min(5, n)); }\n\n  renderVals() {\n    const { profile, peerOnly, editorOpen, demoTab } = this.state;\n    const RED = '#FF492C', NAVY = '#062846', LAV = '#EBE9F5';\n\n    const industries = ['Software / IT', 'Financial Services', 'Marketing / Advertising', 'Education', 'Healthcare', 'Retail / E-commerce'];\n    const sizes = ['Startup (1–50)', 'Mid-Market (51–1,000)', 'Enterprise (1,000+)'];\n    const experiences = ['New to project management', 'Used Trello / Asana', 'Migrating from a Jira-like tool'];\n\n    const industryData = {\n      'Software / IT':           { chose: 82, delta: 0.3, usage: 38 },\n      'Financial Services':      { chose: 74, delta: 0.1, usage: 14 },\n      'Marketing / Advertising': { chose: 57, delta: -0.2, usage: 11 },\n      'Education':               { chose: 61, delta: -0.1, usage: 9 },\n      'Healthcare':              { chose: 66, delta: 0.0, usage: 8 },\n      'Retail / E-commerce':     { chose: 63, delta: -0.1, usage: 20 },\n    };\n    const sizeData = {\n      'Startup (1–50)':        { usage: 30, sat: 4.3, chose: 64 },\n      'Mid-Market (51–1,000)': { usage: 42, sat: 4.6, chose: 78 },\n      'Enterprise (1,000+)':   { usage: 28, sat: 4.5, chose: 83 },\n    };\n\n    const ind = industryData[profile.industry];\n    const sz = sizeData[profile.size];\n    const sizeShort = profile.size.split(' (')[0];\n    const industryShort = profile.industry.split(' /')[0];\n    const segShort = industryShort;\n\n    // ---- profile editor option builders ----\n    const mkOpts = (list, key) => list.map(v => {\n      const active = profile[key] === v;\n      return {\n        label: v,\n        bg: active ? RED : '#fff',\n        fg: active ? '#fff' : '#3B3B42',\n        border: active ? RED : '#C9C9CC',\n        onSelect: () => this.setState(s => ({ profile: { ...s.profile, [key]: v } })),\n      };\n    });\n\n    // ---- overall rating ----\n    const everyoneRating = 4.5;\n    const peerRating = this.clamp(Math.round((sz.sat + ind.delta) * 10) / 10);\n    const ratingShown = (peerOnly ? peerRating : everyoneRating).toFixed(1);\n    const ratingPct = (parseFloat(ratingShown) / 5) * 100;\n    const total = 14283;\n    const peerCount = Math.max(400, Math.round(total * (ind.usage / 100) * (sz.usage / 100) * 3));\n    const fmt = n => n.toLocaleString('en-US');\n    const reviewCountLabel = peerOnly\n      ? `${fmt(peerCount)} reviews from ${industryShort} teams your size`\n      : `${fmt(total)} verified reviews`;\n    const distributionScope = peerOnly ? `${industryShort} teams · ${sizeShort}` : 'All reviewers';\n\n    // ---- distribution ----\n    const distAll = [{ star: 5, pct: 60 }, { star: 4, pct: 28 }, { star: 3, pct: 8 }, { star: 2, pct: 2 }, { star: 1, pct: 2 }];\n    const distPeer = [{ star: 5, pct: 66 }, { star: 4, pct: 26 }, { star: 3, pct: 5 }, { star: 2, pct: 2 }, { star: 1, pct: 1 }];\n    const distribution = peerOnly ? distPeer : distAll;\n\n    // ---- sub-ratings: segment vs everyone ----\n    const subBase = [\n      { label: 'Ease of use', everyone: 4.2 },\n      { label: 'Features & functionality', everyone: 4.4 },\n      { label: 'Value for money', everyone: 4.1 },\n      { label: 'Customer service', everyone: 4.2 },\n    ];\n    const subRatings = subBase.map(s => {\n      const you = this.clamp(Math.round((s.everyone + ind.delta) * 10) / 10);\n      return {\n        label: s.label,\n        everyone: s.everyone.toFixed(1),\n        you: you.toFixed(1),\n        everyoneW: (s.everyone / 5) * 100,\n        youW: (you / 5) * 100,\n      };\n    });\n\n    // ---- callouts ----\n    const deltaStr = (ind.delta >= 0 ? '+' : '') + ind.delta.toFixed(1);\n    const expNote = {\n      'Used Trello / Asana': 'Teams coming from Trello or Asana most often cite Jira’s roadmaps and sprint reporting as the upgrade.',\n      'New to project management': 'New-to-PM teams your size rely on Jira’s templates — expect a 2–3 week ramp before it clicks.',\n      'Migrating from a Jira-like tool': 'Teams migrating from another Jira-like tool value the import tooling and API depth most.',\n    }[profile.experience];\n    const callouts = [\n      { icon: 'groups', color: NAVY, text: `${sz.usage}% of Jira’s users are ${sizeShort} companies — teams like yours.` },\n      { icon: ind.delta >= 0 ? 'trending_up' : 'trending_down', color: ind.delta >= 0 ? '#40BF40' : '#FF9500', text: `${industryShort} teams rate Jira ${deltaStr} vs. the overall average.` },\n      { icon: 'verified', color: RED, text: `${ind.chose}% of ${industryShort} buyers who shortlisted a PM tool chose Jira.` },\n      { icon: 'lightbulb', color: '#288DFF', text: expNote },\n    ];\n\n    // ---- usage charts ----\n    const sizeUsage = sizes.map(v => {\n      const isYou = v === profile.size;\n      return { label: v, pct: sizeData[v].usage, isYou, color: isYou ? RED : '#C4C0DC' };\n    });\n    const industryUsage = industries\n      .map(v => ({ v, usage: industryData[v].usage }))\n      .sort((a, b) => b.usage - a.usage)\n      .map(o => {\n        const isYou = o.v === profile.industry;\n        return { label: o.v, pct: o.usage, isYou, color: isYou ? RED : '#C4C0DC' };\n      });\n\n    // ---- pros & cons ----\n    const pros = [\n      'Deeply customizable workflows, issue types and automation rules',\n      'Best-in-class agile boards, sprints and backlog management',\n      'Scales from a single squad to thousands of users',\n      'Huge integration marketplace — Confluence, Slack, GitHub and more',\n    ];\n    const cons = [\n      'Steep learning curve for new or non-technical users',\n      'Admin and configuration get complex as you scale',\n      'Can feel heavy for lightweight, non-engineering teams',\n      'Costs add up as you add users and Marketplace add-ons',\n    ];\n    const peerHighlightMap = {\n      'Software / IT': 'Software / IT teams your size most often highlight Jira’s agile depth and extensibility.',\n      'Financial Services': 'Financial Services teams value the audit trail and permission controls most.',\n      'Marketing / Advertising': 'Marketing teams your size find Jira powerful but sometimes heavier than they need.',\n      'Education': 'Education teams your size lean on Jira’s free tier and templates.',\n      'Healthcare': 'Healthcare teams your size prioritize the compliance and access controls.',\n      'Retail / E-commerce': 'Retail teams your size use Jira to coordinate engineering with fast release cycles.',\n    };\n    const peerHighlight = peerHighlightMap[profile.industry];\n\n    // ---- pricing ----\n    const recTier = { 'Startup (1–50)': 'Standard', 'Mid-Market (51–1,000)': 'Premium', 'Enterprise (1,000+)': 'Enterprise' }[profile.size];\n    const tiersRaw = [\n      { name: 'Free', price: '$0', unit: '', blurb: 'For up to 10 users.', features: ['Scrum & Kanban boards', 'Backlog & basic roadmaps', '2 GB storage'] },\n      { name: 'Standard', price: '$7.75', unit: '/user/mo', blurb: 'For growing teams.', features: ['User roles & permissions', 'Audit logs', '250 GB storage'] },\n      { name: 'Premium', price: '$15.25', unit: '/user/mo', blurb: 'For scaling orgs.', features: ['Advanced roadmaps', 'Automation at scale', '99.9% uptime SLA'] },\n      { name: 'Enterprise', price: 'Custom', unit: '', blurb: 'For large enterprises.', features: ['Unlimited sites', 'Centralized security', '24/7 support'] },\n    ];\n    const pricing = tiersRaw.map(t => {\n      const recommended = t.name === recTier;\n      return { ...t, recommended, bg: recommended ? '#FFF4F1' : '#fff', border: recommended ? RED : '#E5E5E8' };\n    });\n\n    // ---- alternatives ----\n    const altRaw = [\n      { name: 'Jira', initial: 'J', logoBg: '#288DFF', rating: '4.5', bestFit: 'Software & scaled agile', fitSizes: ['Mid-Market (51–1,000)', 'Enterprise (1,000+)'], isJira: true },\n      { name: 'Trello', initial: 'T', logoBg: '#0079BF', rating: '4.5', bestFit: 'Small, simple teams', fitSizes: ['Startup (1–50)'] },\n      { name: 'Asana', initial: 'A', logoBg: '#F06A6A', rating: '4.5', bestFit: 'Cross-functional work', fitSizes: ['Mid-Market (51–1,000)'] },\n      { name: 'monday.com', initial: 'M', logoBg: '#6161FF', rating: '4.6', bestFit: 'Visual, non-technical', fitSizes: ['Startup (1–50)', 'Mid-Market (51–1,000)'] },\n      { name: 'ClickUp', initial: 'C', logoBg: '#7B68EE', rating: '4.6', bestFit: 'All-in-one, budget', fitSizes: ['Startup (1–50)'] },\n    ];\n    const alternatives = altRaw.map(a => {\n      const fits = a.fitSizes.includes(profile.size);\n      return {\n        name: a.name, initial: a.initial, logoBg: a.logoBg, rating: a.rating, bestFit: a.bestFit,\n        rowBg: a.isJira ? '#FFF4F1' : '#fff',\n        fitColor: fits ? '#40BF40' : '#999',\n        fitIcon: fits ? 'check_circle' : 'remove',\n        fitLabel: fits ? (a.isJira ? 'Strong fit for you' : 'Good fit for you') : 'Less aligned',\n      };\n    });\n\n    // ---- demo tabs ----\n    const demoLabels = [\n      { label: 'Board', caption: 'Jira — Sprint board' },\n      { label: 'Backlog', caption: 'Jira — Backlog & sprints' },\n      { label: 'Timeline', caption: 'Jira — Timeline / roadmap' },\n      { label: 'Dashboard', caption: 'Jira — Reports & dashboards' },\n    ];\n    const demoTabs = demoLabels.map((d, i) => {\n      const active = i === demoTab;\n      return {\n        label: d.label,\n        bg: active ? NAVY : '#fff',\n        fg: active ? '#fff' : '#3B3B42',\n        border: active ? NAVY : '#C9C9CC',\n        onSelect: () => this.setState({ demoTab: i }),\n      };\n    });\n\n    // ---- peer toggle button styling ----\n    const peerBtnBg = peerOnly ? RED : '#fff';\n    const peerBtnFg = peerOnly ? '#fff' : '#3B3B42';\n    const peerBtnBorder = peerOnly ? RED : '#C9C9CC';\n\n    return {\n      profile,\n      editorOpen,\n      editorLabel: editorOpen ? 'Done' : 'This is me',\n      onToggleEditor: () => this.setState(s => ({ editorOpen: !s.editorOpen })),\n      industryOpts: mkOpts(industries, 'industry'),\n      sizeOpts: mkOpts(sizes, 'size'),\n      expOpts: mkOpts(experiences, 'experience'),\n\n      ratingShown, ratingPct, reviewCountLabel,\n      heroChosePct: ind.chose, industryShort, sizeShort, segShort,\n\n      callouts,\n      onTogglePeer: () => this.setState(s => ({ peerOnly: !s.peerOnly })),\n      peerBtnBg, peerBtnFg, peerBtnBorder,\n      peerBtnLabel: peerOnly ? 'Showing people like you' : 'Show people like you',\n      distributionScope, distribution, subRatings,\n\n      sizeUsage, industryUsage,\n      pros, cons, peerHighlight,\n      pricing, alternatives,\n\n      demoTabs,\n      demoCaption: demoLabels[demoTab].caption,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
